# ============================================
# NETLIFY CONFIGURATION - SMART HOTLINE
# MINIMAL CONFIG - NO BUILD MINUTES WASTED
# ============================================

[build]
command = "npm run build:netlify"
publish = "out"

[build.environment]
NODE_VERSION = "20"
NEXT_BASEPATH = ""
NEXT_PUBLIC_SITE_URL = "https://smart-hotline.com"
NETLIFY_NEXT_PLUGIN_SKIP = "true"

# ============================================
# REDIRECTS
# ============================================

# Root redirect to French
[[redirects]]
from = "/"
to = "/fr/"
status = 302
force = true
