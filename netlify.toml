# ============================================
# NETLIFY CONFIGURATION - SMART HOTLINE
# Production-ready for www.smart-hotline.com
# Fixes applied: 7 critical issues from audit
# ============================================

[build]
command = "npm ci && npm run build:netlify"
publish = "out"

[build.environment]
NODE_VERSION = "22"
NEXT_BASEPATH = ""
NEXT_PUBLIC_SITE_URL = "https://www.smart-hotline.com"
NETLIFY_NEXT_PLUGIN_SKIP = "true"

# ============================================
# SECURITY + PERFORMANCE HEADERS
# ============================================

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
# FIX #4: Cache-Control for /* must NOT be immutable — HTML pages need revalidation
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/images/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/videos/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# ============================================
# AGENT-DISCOVERY HEADERS (RFC 8288 Link Headers)
# FIX #2: Single-line string — multi-line TOML syntax is unreliable
# FIX #6: Removed dead /docs/api link (page doesn't exist yet)
# ============================================

[[headers]]
for = "/*"
[headers.values]
Link = "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\", </.well-known/oauth-authorization-server>; rel=\"oauth-authorization-server\"; type=\"application/json\", </.well-known/oauth-protected-resource>; rel=\"oauth-protected-resource\"; type=\"application/json\", </.well-known/mcp/server-card.json>; rel=\"mcp-server\"; type=\"application/json\", </.well-known/agent-card.json>; rel=\"a2a\"; type=\"application/json\", </.well-known/agent-skills/index.json>; rel=\"agent-skills\"; type=\"application/json\", </llms.txt>; rel=\"ai-content\"; type=\"text/plain\""

# ============================================
# .WELL-KNOWN CONTENT-TYPE HEADERS
# ============================================

[[headers]]
for = "/.well-known/api-catalog"
[headers.values]
Content-Type = "application/linkset+json"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/.well-known/oauth-authorization-server"
[headers.values]
Content-Type = "application/json"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/.well-known/oauth-protected-resource"
[headers.values]
Content-Type = "application/json"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/.well-known/mcp/server-card.json"
[headers.values]
Content-Type = "application/json"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/.well-known/agent-skills/index.json"
[headers.values]
Content-Type = "application/json"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/.well-known/agent-skills/*"
[headers.values]
Content-Type = "text/markdown"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/.well-known/agent-card.json"
[headers.values]
Content-Type = "application/json"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/llms.txt"
[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=3600, must-revalidate"

# ============================================
# REDIRECTS
# FIX #1: Removed Role=["admin"] condition that blocked public access
# ============================================

# Root redirect to French (primary language)
[[redirects]]
from = "/"
to = "/fr/"
status = 302
force = true

# Language-based redirect for French browsers
[[redirects]]
from = "/*"
to = "/fr/:splat"
status = 302
force = false
conditions = {Language = ["fr"]}

# Language-based redirect for English browsers
[[redirects]]
from = "/*"
to = "/en/:splat"
status = 302
force = false
conditions = {Language = ["en"]}

# Default fallback redirect to French
[[redirects]]
from = "/*"
to = "/fr/:splat"
status = 302

# ============================================
# EDGE FUNCTIONS
# FIX #3: Scoped to HTML pages only — avoids intercepting static assets
# Netlify edge functions use excludedPath to skip static files
# ============================================

[[edge_functions]]
function = "markdown-for-agents"
path = "/fr/*"

[[edge_functions]]
function = "markdown-for-agents"
path = "/en/*"

# ============================================
# POST PROCESSING (FREE)
# ============================================

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.html]
pretty_urls = true

[build.processing.images]
compress = true
