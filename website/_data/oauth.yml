oauth:
  issuer: "https://smart-hotline.com"
  authorization_endpoint: "https://auth.smart-hotline.com/oauth/authorize"
  token_endpoint: "https://auth.smart-hotline.com/oauth/token"
  grant_types_supported:
    - "authorization_code"
    - "client_credentials"
    - "refresh_token"
  response_types_supported:
    - "code"
  scopes_supported:
    - "openid"
    - "profile"
    - "email"
    - "api"
resource:
  resource: "https://api.smart-hotline.com"
  authorization_servers:
    - "https://auth.smart-hotline.com"
  scopes_supported:
    - "api:read"
    - "api:write"
