<svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean, professional wordmark for a small business -->
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
  </defs>
  
  <!-- Simple phone headset icon on the left -->
  <g transform="translate(0, 8)">
    <!-- Headset arc -->
    <path d="M12 28C12 18 20 10 32 10C44 10 52 18 52 28" stroke="url(#brandGradient)" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Left earpiece -->
    <rect x="8" y="26" width="10" height="18" rx="3" fill="url(#brandGradient)"/>
    
    <!-- Right earpiece -->
    <rect x="46" y="26" width="10" height="18" rx="3" fill="url(#brandGradient)"/>
    
    <!-- Microphone boom -->
    <path d="M52 40C52 44 48 48 44 48H40" stroke="url(#brandGradient)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="36" cy="48" r="4" fill="url(#brandGradient)"/>
  </g>
  
  <!-- Company name - "Smart" in gradient, "Hotline" in solid -->
  <text x="72" y="42" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="url(#brandGradient)">Smart</text>
  <text x="165" y="42" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#1E3A8A">Hotline</text>
  
  <!-- Tagline below -->
  <text x="72" y="56" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" font-weight="400" fill="#64748B" letter-spacing="0.5">Votre Partenaire Téléphonique 24/7</text>
</svg>
