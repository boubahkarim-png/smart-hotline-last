<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional headset icon - clean and recognizable -->
  
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#iconGrad)"/>
  
  <!-- Headset in white -->
  <g transform="translate(14, 12)" fill="white">
    <!-- Headband arc -->
    <path d="M4 24C4 12 12 4 24 4C36 4 44 12 44 24" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Left earpiece -->
    <rect x="0" y="22" width="10" height="16" rx="3" fill="white"/>
    
    <!-- Right earpiece -->
    <rect x="38" y="22" width="10" height="16" rx="3" fill="white"/>
    
    <!-- Microphone -->
    <path d="M44 34C44 38 40 42 36 42H32" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="28" cy="42" r="4" fill="white"/>
  </g>
</svg>
