<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Full logo with icon + wordmark for print/presentations -->
  
  <defs>
    <linearGradient id="fullGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
  </defs>
  
  <!-- Icon circle -->
  <circle cx="60" cy="60" r="52" fill="url(#fullGrad)"/>
  
  <!-- Headset in icon -->
  <g transform="translate(32, 28)" fill="white">
    <path d="M8 36C8 18 20 6 36 6C52 6 64 18 64 36" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
    <rect x="2" y="34" width="14" height="24" rx="4" fill="white"/>
    <rect x="50" y="34" width="14" height="24" rx="4" fill="white"/>
    <path d="M58 52C58 58 52 64 46 64H40" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="34" cy="64" r="6" fill="white"/>
  </g>
  
  <!-- Company name -->
  <text x="140" y="55" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="40" font-weight="800" fill="url(#fullGrad)">Smart</text>
  <text x="265" y="55" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="40" font-weight="800" fill="#1E3A8A">Hotline</text>
  
  <!-- Tagline -->
  <text x="140" y="85" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="400" fill="#64748B" letter-spacing="1">Votre Partenaire Téléphonique 24/7</text>
</svg>
